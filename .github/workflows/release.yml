name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in system.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' system.json > system.json.tmp
          mv system.json.tmp system.json

      - name: Commit updated system.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add system.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Build zip
        run: |
          zip -r legend-in-the-mist-foundry.zip \
            system.json \
            litm.mjs \
            module/ \
            templates/ \
            lang/ \
            assets/ \
            tours/ \
            styles/litm.css \
            LICENSE \
            README.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: legend-in-the-mist-foundry.zip
          generate_release_notes: true
